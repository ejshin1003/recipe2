<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>꼬마요리사 레시피</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#FAFAF7;
  --white:#FFFFFF;
  --text:#1A1A1A;
  --text2:#666;
  --text3:#999;
  --accent:#D85A30;
  --accent-light:#FAECE7;
  --accent2:#0F6E56;
  --border:#E8E6E0;
  --card-shadow:0 2px 12px rgba(0,0,0,0.06);
  --radius:12px;
}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

/* HEADER */
header{background:var(--white);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.header-inner{max-width:1100px;margin:0 auto;padding:0 20px;display:flex;align-items:center;gap:20px;height:60px;}
.logo{font-family:'Playfair Display',serif;font-size:22px;color:var(--accent);white-space:nowrap;text-decoration:none;}
.logo span{font-size:13px;font-family:'Noto Sans KR',sans-serif;font-weight:400;color:var(--text3);margin-left:4px;}

/* SEARCH */
.search-wrap{flex:1;position:relative;max-width:520px;}
.search-input{width:100%;height:40px;border:1.5px solid var(--border);border-radius:40px;padding:0 44px 0 18px;font-size:14px;font-family:'Noto Sans KR',sans-serif;outline:none;background:var(--bg);transition:border-color .2s;}
.search-input:focus{border-color:var(--accent);}
.search-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text3);font-size:18px;display:flex;align-items:center;}
.search-dropdown{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--white);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--card-shadow);z-index:200;max-height:320px;overflow-y:auto;display:none;}
.search-dropdown.show{display:block;}
.dropdown-item{padding:11px 16px;cursor:pointer;font-size:14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);}
.dropdown-item:last-child{border-bottom:none;}
.dropdown-item:hover{background:var(--accent-light);}
.dropdown-item-name{font-weight:500;}
.dropdown-item-cat{font-size:12px;color:var(--text3);}
.dropdown-item-time{font-size:12px;color:var(--accent2);margin-left:auto;}

/* HERO */
.hero{background:linear-gradient(135deg,#1A1A1A 0%,#2D2420 100%);padding:48px 20px 40px;text-align:center;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");}
.hero h1{font-family:'Playfair Display',serif;font-size:36px;color:#fff;margin-bottom:8px;}
.hero p{color:rgba(255,255,255,0.6);font-size:14px;font-weight:300;}
.hero-stats{display:flex;justify-content:center;gap:32px;margin-top:24px;}
.hero-stat{text-align:center;}
.hero-stat-num{font-size:20px;font-weight:700;color:var(--accent);}
.hero-stat-label{font-size:11px;color:rgba(255,255,255,0.5);margin-top:2px;}

/* CATEGORIES */
.section{max-width:1100px;margin:0 auto;padding:32px 20px 0;}
.section-title{font-size:13px;font-weight:700;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:14px;}
.cats{display:flex;flex-wrap:wrap;gap:8px;}
.cat-btn{padding:9px 18px;border-radius:40px;border:1.5px solid var(--border);background:var(--white);font-size:13px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;transition:all .2s;color:var(--text);font-weight:500;white-space:nowrap;}
.cat-btn:hover{border-color:var(--accent);color:var(--accent);}
.cat-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.cat-btn .cat-icon{margin-right:5px;}
.cat-btn .cat-count{font-size:11px;opacity:0.7;margin-left:4px;}

/* FILTERS */
.filters{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px;}
.filter-select{height:36px;border:1px solid var(--border);border-radius:8px;padding:0 12px;font-size:13px;font-family:'Noto Sans KR',sans-serif;background:var(--white);color:var(--text);outline:none;cursor:pointer;}
.filter-select:focus{border-color:var(--accent);}
.filter-reset{height:36px;padding:0 14px;border-radius:8px;border:1px solid var(--border);background:none;font-size:13px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;color:var(--text3);}
.filter-reset:hover{color:var(--accent);border-color:var(--accent);}
.result-count{margin-left:auto;font-size:13px;color:var(--text3);display:flex;align-items:center;}

/* GRID */
.grid-section{max-width:1100px;margin:0 auto;padding:20px 20px 60px;}
.recipe-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;}

/* RECIPE CARD */
.recipe-card{background:var(--white);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;transition:transform .2s,box-shadow .2s;cursor:pointer;}
.recipe-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,0.1);}
.recipe-card-img{width:100%;height:160px;background:linear-gradient(135deg,#F5E6D3,#FAD7C3);display:flex;align-items:center;justify-content:center;font-size:48px;position:relative;}
.recipe-card-img .img-placeholder{font-size:44px;}
.recipe-badge{position:absolute;top:10px;left:10px;background:var(--accent);color:#fff;font-size:11px;padding:3px 8px;border-radius:20px;font-weight:500;}
.recipe-badge.green{background:var(--accent2);}
.recipe-card-body{padding:14px;}
.recipe-card-name{font-size:15px;font-weight:700;margin-bottom:4px;line-height:1.3;}
.recipe-card-desc{font-size:12px;color:var(--text3);margin-bottom:10px;line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.recipe-card-meta{display:flex;gap:8px;flex-wrap:wrap;}
.meta-tag{font-size:11px;padding:3px 8px;border-radius:20px;background:var(--bg);color:var(--text2);border:1px solid var(--border);}
.meta-tag.time{background:#EAF3DE;color:#3B6D11;border-color:#C0DD97;}
.meta-tag.level{background:#E6F1FB;color:#185FA5;border-color:#B5D4F4;}
.recipe-card-footer{padding:10px 14px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.recipe-views{font-size:11px;color:var(--text3);}
.recipe-actions{display:flex;gap:6px;}
.action-btn{height:28px;padding:0 10px;border-radius:6px;border:1px solid var(--border);background:none;font-size:11px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;color:var(--text2);transition:all .15s;}
.action-btn:hover{background:var(--accent-light);border-color:var(--accent);color:var(--accent);}
.action-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.action-btn.primary:hover{background:#C04A22;}

/* LOAD MORE */
.load-more-wrap{text-align:center;padding:20px 0 40px;}
.load-more-btn{height:44px;padding:0 32px;border-radius:40px;border:1.5px solid var(--accent);background:none;font-size:14px;font-family:'Noto Sans KR',sans-serif;color:var(--accent);cursor:pointer;font-weight:500;transition:all .2s;}
.load-more-btn:hover{background:var(--accent);color:#fff;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:500;display:none;align-items:flex-start;justify-content:center;padding:20px;overflow-y:auto;}
.modal-overlay.show{display:flex;}
.modal{background:var(--white);border-radius:16px;width:100%;max-width:680px;margin:auto;overflow:hidden;}
.modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:16px;}
.modal-img{width:80px;height:80px;border-radius:12px;background:linear-gradient(135deg,#F5E6D3,#FAD7C3);display:flex;align-items:center;justify-content:center;font-size:36px;flex-shrink:0;}
.modal-title-wrap{flex:1;}
.modal-name{font-size:20px;font-weight:700;margin-bottom:6px;}
.modal-meta{display:flex;gap:8px;flex-wrap:wrap;}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--text3);margin-left:auto;padding:0 4px;}
.modal-body{padding:20px 24px;}
.modal-section{margin-bottom:22px;}
.modal-section-title{font-size:13px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.ingredient-list{display:flex;flex-wrap:wrap;gap:8px;}
.ingredient-chip{background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:13px;}
.modal-links{display:flex;gap:10px;flex-wrap:wrap;}
.modal-link-btn{height:40px;padding:0 18px;border-radius:8px;font-size:13px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;font-weight:500;text-decoration:none;display:inline-flex;align-items:center;gap:6px;border:1.5px solid;}
.modal-link-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.modal-link-btn.secondary{background:none;color:var(--text);border-color:var(--border);}
.modal-link-btn:hover{opacity:0.85;}

/* SHOP */
.shop-section{margin-top:8px;}
.shop-title{font-size:13px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.shop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;}
.shop-item{border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:all .2s;background:var(--white);}
.shop-item:hover{border-color:var(--accent);box-shadow:0 4px 12px rgba(216,90,48,0.1);}
.shop-item-img{width:100%;height:100px;object-fit:cover;background:#f0ece6;display:flex;align-items:center;justify-content:center;font-size:28px;}
.shop-item-img img{width:100%;height:100%;object-fit:cover;}
.shop-item-body{padding:8px;}
.shop-item-name{font-size:12px;line-height:1.3;margin-bottom:4px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.shop-item-price{font-size:13px;font-weight:700;color:var(--accent);}
.shop-item-actions{display:flex;gap:4px;margin-top:6px;}
.shop-action{flex:1;height:26px;border-radius:5px;border:1px solid var(--border);background:none;font-size:11px;font-family:'Noto Sans KR',sans-serif;cursor:pointer;}
.shop-action.cart{background:var(--accent);color:#fff;border-color:var(--accent);}
.shop-item-loading{text-align:center;padding:20px;color:var(--text3);font-size:13px;grid-column:1/-1;}
.shop-cart-all{width:100%;margin-top:12px;height:42px;border-radius:8px;border:none;background:#1A1A1A;color:#fff;font-size:14px;font-family:'Noto Sans KR',sans-serif;font-weight:500;cursor:pointer;transition:background .2s;}
.shop-cart-all:hover{background:#333;}

/* EMPTY / LOADING */
.empty-state{text-align:center;padding:60px 20px;color:var(--text3);}
.empty-state-icon{font-size:48px;margin-bottom:12px;}
.loading-state{text-align:center;padding:60px 20px;color:var(--text3);font-size:14px;}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#1A1A1A;color:#fff;padding:10px 20px;border-radius:30px;font-size:13px;z-index:999;opacity:0;transition:all .3s;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@media(max-width:600px){
  .hero h1{font-size:26px;}
  .recipe-grid{grid-template-columns:repeat(2,1fr);}
  .recipe-card-img{height:120px;}
  .modal{border-radius:12px 12px 0 0;margin-top:auto;margin-bottom:0;}
  .shop-grid{grid-template-columns:repeat(2,1fr);}
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="logo" href="#">꼬마요리사<span>레시피</span></a>
    <div class="search-wrap">
      <input class="search-input" type="text" id="searchInput" placeholder="요리 이름, 재료로 검색..." autocomplete="off">
      <button class="search-btn" onclick="doSearch()">🔍</button>
      <div class="search-dropdown" id="searchDropdown"></div>
    </div>
  </div>
</header>

<div class="hero">
  <h1>오늘 뭐 먹지? 🍳</h1>
  <p>26,000개 레시피에서 찾아보세요</p>
  <div class="hero-stats">
    <div class="hero-stat"><div class="hero-stat-num" id="statTotal">-</div><div class="hero-stat-label">전체 레시피</div></div>
    <div class="hero-stat"><div class="hero-stat-num" id="statFast">4,388</div><div class="hero-stat-label">10분 이내</div></div>
    <div class="hero-stat"><div class="hero-stat-num" id="statGuest">883</div><div class="hero-stat-label">손님요리</div></div>
  </div>
</div>

<div class="section">
  <div class="section-title">카테고리</div>
  <div class="cats" id="catBtns"></div>
  <div class="filters">
    <select class="filter-select" id="filterTime" onchange="applyFilters()">
      <option value="">⏱ 조리시간 전체</option>
      <option value="5분이내">5분 이내</option>
      <option value="10분이내">10분 이내</option>
      <option value="15분이내">15분 이내</option>
      <option value="30분이내">30분 이내</option>
      <option value="60분이내">60분 이내</option>
    </select>
    <select class="filter-select" id="filterLevel" onchange="applyFilters()">
      <option value="">👩‍🍳 난이도 전체</option>
      <option value="아무나">아무나</option>
      <option value="초급">초급</option>
      <option value="중급">중급</option>
      <option value="고급">고급</option>
    </select>
    <select class="filter-select" id="filterSort" onchange="applyFilters()">
      <option value="views">조회수 순</option>
      <option value="likes">추천수 순</option>
      <option value="recent">최신 순</option>
    </select>
    <button class="filter-reset" onclick="resetFilters()">초기화</button>
    <div class="result-count" id="resultCount"></div>
  </div>
</div>

<div class="grid-section">
  <div class="recipe-grid" id="recipeGrid"></div>
  <div class="load-more-wrap" id="loadMoreWrap" style="display:none;">
    <button class="load-more-btn" onclick="loadMore()">더 보기</button>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-img" id="modalImg"><span id="modalEmoji">🍽</span></div>
      <div class="modal-title-wrap">
        <div class="modal-name" id="modalName"></div>
        <div class="modal-meta" id="modalMeta"></div>
      </div>
      <button class="modal-close" onclick="closeModalBtn()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-section">
        <div class="modal-section-title">요리 소개</div>
        <p id="modalDesc" style="font-size:14px;line-height:1.7;color:var(--text2);"></p>
      </div>
      <div class="modal-section">
        <div class="modal-section-title">재료</div>
        <div class="ingredient-list" id="modalIngredients"></div>
      </div>
      <div class="modal-section">
        <div class="modal-section-title">레시피 보기</div>
        <div class="modal-links">
          <a class="modal-link-btn primary" id="modalRecipeLink" href="#" target="_blank">📋 상세 레시피 보기 (만개의레시피)</a>
          <a class="modal-link-btn secondary" id="modalSearchLink" href="#" target="_blank">🔍 레시피 더 검색하기</a>
        </div>
      </div>
      <div class="shop-section" id="shopSection">
        <div class="shop-title">🛒 재료 구매 (쿠팡)</div>
        <div class="shop-grid" id="shopGrid"><div class="shop-item-loading">재료를 불러오는 중...</div></div>
        <button class="shop-cart-all" id="cartAllBtn" style="display:none;" onclick="addAllToCart()">🛒 재료 전체 쿠팡에서 검색</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const CATEGORIES = [
  {key:'전체', label:'🍽 전체', filter:null},
  {key:'밥/죽/떡', label:'🍚 밥류', filter:{cats:['밥/죽/떡']}},
  {key:'면/만두', label:'🍜 면류', filter:{cats:['면/만두']}},
  {key:'국/탕', label:'🍲 국/탕', filter:{cats:['국/탕','찌개']}},
  {key:'메인반찬', label:'🥩 메인반찬', filter:{cats:['메인반찬']}},
  {key:'밑반찬', label:'🥬 밑반찬', filter:{cats:['밑반찬']}},
  {key:'디저트', label:'🍰 디저트', filter:{cats:['디저트','빵/과자']}},
  {key:'스피드요리', label:'⚡ 스피드요리', filter:{cats:['스피드요리']}},
  {key:'손님요리', label:'🥂 손님요리', filter:{cats:['손님요리']}},
  {key:'샐러드', label:'🥗 샐러드', filter:{cats:['샐러드']}},
];

const EMOJI_MAP = {
  '밥/죽/떡':'🍚','면/만두':'🍜','국/탕':'🍲','찌개':'🍲','메인반찬':'🥩',
  '밑반찬':'🥬','디저트':'🍰','빵/과자':'🥐','샐러드':'🥗','양식':'🍝',
  '퓨전':'🌮','기타':'🍽','스피드요리':'⚡','손님요리':'🥂'
};

// ★ 쿠팡 파트너스 설정 (Netlify Function 프록시 URL로 교체 필요)
const COUPANG_PROXY = '/.netlify/functions/coupang';
const COUPANG_PARTNER_ID = 'YOUR_PARTNER_ID'; // 여기에 파트너 ID 입력

let allRecipes = [];
let filtered = [];
let currentPage = 0;
const PAGE_SIZE = 24;
let currentCat = '전체';
let currentRecipe = null;
let searchTimer = null;

// 데이터 로드
async function loadData() {
  try {
    document.getElementById('recipeGrid').innerHTML = '<div class="loading-state">🍳 레시피를 불러오는 중...</div>';
    const res = await fetch('./recipes.json');
    if (!res.ok) throw new Error('데이터 로드 실패');
    allRecipes = await res.json();
    document.getElementById('statTotal').textContent = allRecipes.length.toLocaleString();
    applyFilters();
  } catch(e) {
    document.getElementById('recipeGrid').innerHTML = `<div class="empty-state"><div class="empty-state-icon">😢</div><p>레시피를 불러올 수 없어요.<br>recipes.json 파일이 같은 폴더에 있는지 확인해주세요.</p></div>`;
    console.error(e);
  }
}

// 카테고리 버튼 생성
function buildCats() {
  const wrap = document.getElementById('catBtns');
  wrap.innerHTML = '';
  CATEGORIES.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (c.key === currentCat ? ' active' : '');
    btn.innerHTML = c.label;
    btn.onclick = () => selectCat(c.key);
    wrap.appendChild(btn);
  });
}

function selectCat(key) {
  currentCat = key;
  buildCats();
  applyFilters();
}

function applyFilters() {
  const timeFilter = document.getElementById('filterTime').value;
  const levelFilter = document.getElementById('filterLevel').value;
  const sortBy = document.getElementById('filterSort').value;
  const catData = CATEGORIES.find(c=>c.key===currentCat);

  let result = allRecipes.filter(r => {
    if (catData && catData.filter) {
      const cats = catData.filter.cats;
      if (!r.cats.some(c => cats.includes(c))) return false;
    }
    if (timeFilter && r.time !== timeFilter) return false;
    if (levelFilter && r.level !== levelFilter) return false;
    return true;
  });

  if (sortBy === 'views') result.sort((a,b)=>b.views-a.views);
  else if (sortBy === 'likes') result.sort((a,b)=>b.likes-a.likes);
  else result.sort((a,b)=>b.id-a.id);

  filtered = result;
  currentPage = 0;
  document.getElementById('resultCount').textContent = `${filtered.length.toLocaleString()}개`;
  renderGrid();
}

function resetFilters() {
  document.getElementById('filterTime').value='';
  document.getElementById('filterLevel').value='';
  document.getElementById('filterSort').value='views';
  currentCat='전체';
  buildCats();
  applyFilters();
}

function renderGrid() {
  const grid = document.getElementById('recipeGrid');
  const start = 0;
  const end = (currentPage+1)*PAGE_SIZE;
  const slice = filtered.slice(start, end);

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🔍</div><p>검색 결과가 없어요</p></div>';
    document.getElementById('loadMoreWrap').style.display='none';
    return;
  }

  grid.innerHTML = slice.map(r => renderCard(r)).join('');
  document.getElementById('loadMoreWrap').style.display = end < filtered.length ? 'block' : 'none';
}

function loadMore() {
  currentPage++;
  const grid = document.getElementById('recipeGrid');
  const end = (currentPage+1)*PAGE_SIZE;
  const slice = filtered.slice(0, end);
  grid.innerHTML = slice.map(r => renderCard(r)).join('');
  document.getElementById('loadMoreWrap').style.display = end < filtered.length ? 'block' : 'none';
}

function getEmoji(r) {
  for(const cat of r.cats) { if(EMOJI_MAP[cat]) return EMOJI_MAP[cat]; }
  return '🍽';
}

function renderCard(r) {
  const emoji = getEmoji(r);
  const isFast = r.cats.includes('스피드요리');
  const isGuest = r.cats.includes('손님요리');
  const badge = isFast ? '<span class="recipe-badge green">⚡ 빠른요리</span>' : isGuest ? '<span class="recipe-badge">🥂 손님요리</span>' : '';
  const timeCls = r.time ? 'meta-tag time' : 'meta-tag';
  const levelCls = r.level ? 'meta-tag level' : 'meta-tag';
  return `
<div class="recipe-card" onclick="openModal(${r.id})">
  <div class="recipe-card-img">
    <span class="img-placeholder">${emoji}</span>
    ${badge}
  </div>
  <div class="recipe-card-body">
    <div class="recipe-card-name">${escHtml(r.name)}</div>
    <div class="recipe-card-desc">${escHtml(r.desc||'')}</div>
    <div class="recipe-card-meta">
      ${r.time ? `<span class="${timeCls}">${r.time}</span>` : ''}
      ${r.level ? `<span class="${levelCls}">${r.level}</span>` : ''}
      ${r.servings ? `<span class="meta-tag">${r.servings}</span>` : ''}
    </div>
  </div>
  <div class="recipe-card-footer">
    <span class="recipe-views">👁 ${r.views.toLocaleString()}</span>
    <div class="recipe-actions">
      <button class="action-btn primary" onclick="event.stopPropagation();openModal(${r.id})">레시피 보기</button>
    </div>
  </div>
</div>`;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// 모달 열기
function openModal(id) {
  const r = allRecipes.find(x=>x.id===id);
  if(!r) return;
  currentRecipe = r;
  document.getElementById('modalEmoji').textContent = getEmoji(r);
  document.getElementById('modalName').textContent = r.name;

  const metaEl = document.getElementById('modalMeta');
  const tags = [];
  if(r.time) tags.push(`<span class="meta-tag time">${r.time}</span>`);
  if(r.level) tags.push(`<span class="meta-tag level">${r.level}</span>`);
  if(r.servings) tags.push(`<span class="meta-tag">${r.servings}</span>`);
  if(r.method) tags.push(`<span class="meta-tag">${r.method}</span>`);
  metaEl.innerHTML = tags.join('');

  document.getElementById('modalDesc').textContent = r.desc || '설명이 없어요.';

  const ingEl = document.getElementById('modalIngredients');
  if(r.ingredients && r.ingredients.length > 0) {
    ingEl.innerHTML = r.ingredients.map(i=>`<span class="ingredient-chip">${escHtml(i)}</span>`).join('');
  } else {
    ingEl.innerHTML = '<span style="color:var(--text3);font-size:13px;">재료 정보가 없어요</span>';
  }

  const recipeUrl = `https://www.10000recipe.com/recipe/${r.id}`;
  const searchUrl = `https://www.10000recipe.com/recipe/list.html?q=${encodeURIComponent(r.name)}`;
  document.getElementById('modalRecipeLink').href = recipeUrl;
  document.getElementById('modalSearchLink').href = searchUrl;

  document.getElementById('modalOverlay').classList.add('show');
  document.body.style.overflow = 'hidden';

  loadShopItems(r.ingredients);
}

function closeModal(e) {
  if(e.target === document.getElementById('modalOverlay')) closeModalBtn();
}
function closeModalBtn() {
  document.getElementById('modalOverlay').classList.remove('show');
  document.body.style.overflow = '';
}

// 쿠팡 상품 로드
async function loadShopItems(ingredients) {
  const shopGrid = document.getElementById('shopGrid');
  const cartAllBtn = document.getElementById('cartAllBtn');
  shopGrid.innerHTML = '<div class="shop-item-loading">🛒 재료를 찾는 중...</div>';
  cartAllBtn.style.display = 'none';

  const targets = ingredients.slice(0, 5);
  if(targets.length === 0) {
    shopGrid.innerHTML = '<div class="shop-item-loading">재료 정보가 없어요</div>';
    return;
  }

  const results = await Promise.allSettled(targets.map(ing => fetchCoupangItem(ing)));
  const items = results.filter(r=>r.status==='fulfilled' && r.value).map(r=>r.value);

  if(items.length === 0) {
    shopGrid.innerHTML = `<div class="shop-item-loading">
      쿠팡 연동을 위해 Netlify Function 설정이 필요해요.<br>
      <a href="https://partners.coupang.com" target="_blank" style="color:var(--accent);">쿠팡 파트너스 바로가기</a>
    </div>`;
    return;
  }

  shopGrid.innerHTML = items.map(item => renderShopItem(item)).join('');
  cartAllBtn.style.display = 'block';
}

async function fetchCoupangItem(keyword) {
  try {
    // Netlify Function 프록시로 쿠팡 API 호출
    const res = await fetch(`${COUPANG_PROXY}?keyword=${encodeURIComponent(keyword)}&limit=1`);
    if(!res.ok) throw new Error('API 오류');
    const data = await res.json();
    if(data && data.data && data.data.length > 0) {
      const item = data.data[0];
      return {
        keyword,
        name: item.productName,
        price: item.productPrice,
        image: item.productImage,
        url: item.productUrl,
        cartUrl: item.deepLink || item.productUrl,
      };
    }
  } catch(e) {
    // Fallback: 검색 링크 생성
    return {
      keyword,
      name: `${keyword} (쿠팡 검색)`,
      price: null,
      image: null,
      url: `https://www.coupang.com/np/search?q=${encodeURIComponent(keyword)}`,
      cartUrl: null,
      isSearch: true,
    };
  }
  return null;
}

function renderShopItem(item) {
  const imgHtml = item.image
    ? `<img src="${escHtml(item.image)}" alt="${escHtml(item.keyword)}" onerror="this.style.display='none'">`
    : `<span style="font-size:28px;">${getIngEmoji(item.keyword)}</span>`;
  const priceHtml = item.price ? `<div class="shop-item-price">${Number(item.price).toLocaleString()}원</div>` : '';
  const cartBtn = item.cartUrl && !item.isSearch
    ? `<button class="shop-action cart" onclick="event.stopPropagation();addToCart('${escHtml(item.cartUrl)}','${escHtml(item.name)}')">담기</button>`
    : '';

  return `<div class="shop-item" onclick="openLink('${escHtml(item.url)}')">
    <div class="shop-item-img">${imgHtml}</div>
    <div class="shop-item-body">
      <div class="shop-item-name">${escHtml(item.name)}</div>
      ${priceHtml}
      <div class="shop-item-actions">
        ${cartBtn}
        <button class="shop-action" style="flex:1" onclick="event.stopPropagation();openLink('${escHtml(item.url)}')">검색</button>
      </div>
    </div>
  </div>`;
}

function getIngEmoji(name) {
  const map = {'고기':'🥩','소고기':'🥩','돼지':'🥩','닭':'🍗','달걀':'🥚','계란':'🥚','양파':'🧅','마늘':'🧄','감자':'🥔','당근':'🥕','두부':'🟡','버섯':'🍄','파':'🌿','김치':'🥬','밀가루':'🌾','설탕':'🍬','소금':'🧂','간장':'🫙','참기름':'🫙','올리브유':'🫒','새우':'🍤','오징어':'🦑','돼지고기':'🥩','생선':'🐟'};
  for(const k in map) if(name.includes(k)) return map[k];
  return '🛒';
}

function addToCart(url, name) {
  openLink(url);
  showToast(`${name} 장바구니로 이동!`);
}

function addAllToCart() {
  if(!currentRecipe) return;
  const q = currentRecipe.ingredients.join(' ');
  const url = `https://www.coupang.com/np/search?q=${encodeURIComponent(q)}`;
  openLink(url);
  showToast('쿠팡에서 재료를 검색해요!');
}

function openLink(url) {
  window.open(url, '_blank', 'noopener');
}

// 검색 자동완성
document.getElementById('searchInput').addEventListener('input', function() {
  clearTimeout(searchTimer);
  const q = this.value.trim();
  if(q.length < 1) { hideDropdown(); return; }
  searchTimer = setTimeout(()=>showDropdown(q), 200);
});
document.getElementById('searchInput').addEventListener('keydown', function(e) {
  if(e.key==='Enter') { doSearch(); hideDropdown(); }
  if(e.key==='Escape') hideDropdown();
});
document.addEventListener('click', function(e) {
  if(!e.target.closest('.search-wrap')) hideDropdown();
});

function showDropdown(q) {
  const dd = document.getElementById('searchDropdown');
  const matches = allRecipes.filter(r =>
    r.name.includes(q) || r.ingredients.some(i=>i.includes(q))
  ).slice(0,8);

  if(matches.length === 0) { hideDropdown(); return; }

  dd.innerHTML = matches.map(r=>`
    <div class="dropdown-item" onclick="openModal(${r.id});hideDropdown();">
      <span style="font-size:18px;">${getEmoji(r)}</span>
      <div>
        <div class="dropdown-item-name">${highlight(r.name,q)}</div>
        <div class="dropdown-item-cat">${r.cats[0]||''} · ${r.level||''}</div>
      </div>
      <div class="dropdown-item-time">${r.time||''}</div>
    </div>`).join('');
  dd.classList.add('show');
}

function highlight(text, q) {
  return text.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'), '<strong style="color:var(--accent)">$1</strong>');
}

function hideDropdown() {
  document.getElementById('searchDropdown').classList.remove('show');
}

function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if(!q) { applyFilters(); return; }
  const timeFilter = document.getElementById('filterTime').value;
  const levelFilter = document.getElementById('filterLevel').value;
  const sortBy = document.getElementById('filterSort').value;
  filtered = allRecipes.filter(r=>
    r.name.includes(q) || r.ingredients.some(i=>i.includes(q)) || r.desc.includes(q)
  );
  if(timeFilter) filtered = filtered.filter(r=>r.time===timeFilter);
  if(levelFilter) filtered = filtered.filter(r=>r.level===levelFilter);
  if(sortBy==='views') filtered.sort((a,b)=>b.views-a.views);
  else if(sortBy==='likes') filtered.sort((a,b)=>b.likes-a.likes);
  currentPage=0;
  document.getElementById('resultCount').textContent = `${filtered.length.toLocaleString()}개`;
  renderGrid();
  currentCat='전체';
  buildCats();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

// init
buildCats();
loadData();
</script>
